<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Learn JavaScript</title>
    <link rel="stylesheet" href="main.css" />
    <style>
      body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background-color: #0f172a;
        color: #f8fafc;
      }
      .container {
        width: 500px;
        margin: 40px auto;
      }
      .form {
        background-color: #1e293b;
        border-radius: 12px;
        padding: 20px;
        display: flex;
        align-items: center;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
      }
      .input {
        padding: 12px;
        border: 2px solid #334155;
        border-radius: 8px;
        flex: 1;
        background-color: #0f172a;
        color: white;
        transition: 0.3s;
      }
      .input:focus {
        outline: none;
        border-color: #7c3aed;
      }
      .add {
        border: none;
        background-color: #7c3aed;
        color: white;
        padding: 12px 20px;
        border-radius: 8px;
        margin-left: 10px;
        cursor: pointer;
        font-weight: bold;
        transition: 0.3s;
      }
      .add:hover {
        background-color: #6d28d9;
        box-shadow: 0 0 10px rgba(124, 58, 237, 0.5);
      }
      .tasks {
        background-color: #1e293b;
        margin-top: 20px;
        border-radius: 12px;
        padding: 20px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
      }
      .tasks .task {
        background-color: #334155;
        padding: 12px;
        border-radius: 8px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        transition: 0.3s;
        cursor: pointer;
        border-left: 4px solid #7c3aed;
      }
      .tasks .task:not(:last-child) {
        margin-bottom: 15px;
      }
      .tasks .task:hover {
        background-color: #475569;
        transform: translateX(5px);
      }
      .tasks .task.done {
        opacity: 0.4;
        border-left-color: #64748b;
      }
      .tasks .task span {
        font-weight: bold;
        font-size: 11px;
        background-color: #e11d48;
        color: white;
        padding: 4px 10px;
        border-radius: 6px;
        cursor: pointer;
        transition: 0.3s;
      }
      .tasks .task span:hover {
        background-color: #be123c;
        transform: scale(1.1);
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="form">
        <input type="text" class="input" placeholder="Add a new task..." />
        <input type="submit" class="add" value="Add Task" />
      </div>
      <div class="tasks">
        </div>
    </div>
    <script src="main.js"></script>
  </body>
</html>
